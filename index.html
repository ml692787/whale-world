<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Whale World Adventure!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --ui-bg:rgba(2,18,44,0.92);
  --ui-border:rgba(35,166,213,0.55);
  --gold:#ffd700;
  --teal:#23a6d5;
  --soft:#7ee8ff;
}
body{font-family:'Fredoka One',cursive;overflow:hidden;background:#021222;width:100vw;height:100vh;touch-action:none;}
canvas{display:block;position:fixed;inset:0;}

/* ── OVERLAY PANELS ── */
.panel{
  position:fixed;z-index:800;
  background:var(--ui-bg);
  border:3px solid var(--ui-border);
  border-radius:24px;
  padding:20px;
  backdrop-filter:blur(12px);
  color:#fff;
  font-family:'Fredoka One',cursive;
  box-shadow:0 0 40px rgba(35,166,213,0.25);
  display:none;
}
.panel.open{display:block;}
.panel-title{
  font-family:'Bubblegum Sans',cursive;
  font-size:26px;color:var(--soft);
  text-align:center;margin-bottom:14px;
  text-shadow:0 0 16px var(--teal);
}

/* DIALOGUE BOX */
#dialogue{
  bottom:20px;left:50%;transform:translateX(-50%);
  width:min(660px,94vw);
  padding:16px 22px;
  display:none;
}
#dialogue.open{display:flex;align-items:flex-start;gap:14px;}
#dlg-avatar{font-size:56px;flex-shrink:0;animation:bobAvatar 1.2s ease-in-out infinite;}
@keyframes bobAvatar{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
#dlg-body{}
#dlg-name{font-family:'Bubblegum Sans',cursive;font-size:16px;color:var(--gold);margin-bottom:4px;}
#dlg-text{font-size:19px;line-height:1.5;color:#fff;}
#dlg-sub{font-size:14px;color:var(--soft);margin-top:6px;}
.dlg-btn{
  margin-top:10px;padding:12px 26px;
  background:linear-gradient(135deg,var(--teal),#1560a0);
  border:2px solid var(--soft);border-radius:30px;
  color:#fff;font-family:'Bubblegum Sans',cursive;font-size:18px;
  cursor:pointer;transition:all .15s;
  min-height:48px;
}
.dlg-btn:hover{transform:scale(1.06);box-shadow:0 0 14px var(--teal);}

/* QUEST HUD */
#quest-hud{
  top:58px;left:12px;
  width:220px;padding:12px 14px;
  position:fixed;z-index:700;
  background:var(--ui-bg);
  border:2px solid var(--ui-border);
  border-radius:16px;
  display:none;
}
#quest-hud.open{display:block;}
#qh-title{font-family:'Bubblegum Sans',cursive;font-size:13px;color:var(--gold);margin-bottom:4px;}
#qh-text{font-size:14px;color:#fff;line-height:1.3;}
#qh-bar-wrap{margin-top:6px;background:rgba(255,255,255,0.1);border-radius:20px;height:10px;overflow:hidden;}
#qh-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:20px;transition:width .4s;}
#qh-count{font-size:12px;color:var(--soft);margin-top:3px;}

/* HUD TOP BAR */
#hud{
  position:fixed;top:0;left:0;right:0;height:50px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:700;
  background:rgba(2,18,44,0.8);
  border-bottom:2px solid rgba(35,166,213,0.3);
  backdrop-filter:blur(6px);
}
#hud-name{font-family:'Bubblegum Sans',cursive;font-size:18px;color:var(--soft);}
#hud-stars{font-size:20px;color:var(--gold);}
#hud-power{font-size:18px;}
#hud-hint{font-size:12px;color:rgba(255,255,255,0.35);}

/* HOME SCREEN */
#home-screen{
  position:fixed;inset:0;z-index:900;
  background:linear-gradient(160deg,#0a2040 0%,#03224c 40%,#021222 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}
.home-bubbles{position:absolute;inset:0;pointer-events:none;}
.home-title{
  font-family:'Bubblegum Sans',cursive;
  font-size:clamp(36px,7vw,64px);
  color:#fff;
  text-shadow:0 0 40px var(--teal),0 4px 16px rgba(0,0,0,0.6);
  margin-bottom:6px;text-align:center;
}
.home-sub{font-size:16px;color:var(--soft);margin-bottom:30px;text-align:center;}
.big-btn{
  padding:16px 44px;
  background:linear-gradient(135deg,#23a6d5 0%,#1560a0 100%);
  border:3px solid var(--soft);border-radius:50px;
  color:#fff;font-family:'Bubblegum Sans',cursive;font-size:24px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 0 30px rgba(35,166,213,0.5);margin:6px;
}
.big-btn:hover{transform:scale(1.07);box-shadow:0 0 50px rgba(35,166,213,0.8);}

/* CAVE / SHOP */
#cave-screen{
  position:fixed;inset:0;z-index:850;
  background:radial-gradient(ellipse at 40% 60%,#0a3060 0%,#021222 70%);
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px;
}
.cave-title{
  font-family:'Bubblegum Sans',cursive;
  font-size:36px;color:var(--soft);
  text-shadow:0 0 24px var(--teal);
  margin-bottom:4px;margin-top:8px;
}
.cave-gold{font-size:22px;color:var(--gold);margin-bottom:18px;}
.cave-tabs{display:flex;gap:8px;margin-bottom:16px;}
.cave-tab{
  padding:11px 22px;border-radius:30px;
  background:rgba(255,255,255,0.07);
  border:2px solid rgba(255,255,255,0.15);
  color:#fff;font-family:'Fredoka One',cursive;font-size:15px;
  cursor:pointer;transition:all .15s;
  min-height:48px;
  -webkit-tap-highlight-color:transparent;
}
.cave-tab.active{background:rgba(35,166,213,0.35);border-color:var(--soft);}
.shop-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;width:100%;max-width:720px;
}
.shop-item{
  background:rgba(255,255,255,0.06);
  border:2px solid rgba(255,255,255,0.12);
  border-radius:18px;padding:16px 14px;
  text-align:center;cursor:pointer;transition:all .2s;
  min-height:110px;
  -webkit-tap-highlight-color:transparent;
}
.shop-item:hover{border-color:var(--soft);transform:translateY(-3px);}
.shop-item.owned{border-color:var(--gold);background:rgba(255,215,0,0.08);}
.shop-item.equipped{border-color:#2ecc71;background:rgba(46,204,113,0.1);}
.shop-emoji{font-size:40px;display:block;margin-bottom:6px;}
.shop-name{font-size:14px;color:#fff;margin-bottom:4px;}
.shop-cost{font-size:13px;color:var(--gold);}
.shop-desc{font-size:11px;color:var(--soft);margin-top:3px;line-height:1.3;}
.leave-cave-btn{
  margin-top:20px;padding:12px 36px;
  background:linear-gradient(135deg,#2ecc71,#1a9a50);
  border:2px solid #7dffb3;border-radius:40px;
  color:#fff;font-family:'Bubblegum Sans',cursive;font-size:20px;
  cursor:pointer;transition:all .2s;
}
.leave-cave-btn:hover{transform:scale(1.06);}

/* FACT POPUP */
#fact-pop{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  z-index:750;
  background:rgba(2,18,44,0.95);
  border:2px solid var(--gold);
  border-radius:20px;padding:14px 20px;
  max-width:min(360px,88vw);text-align:center;
  display:none;animation:factIn .4s cubic-bezier(.175,.885,.32,1.275);
  cursor:pointer;
}
@keyframes factIn{from{transform:translateX(-50%) scale(0.7) translateY(-20px);opacity:0;}to{transform:translateX(-50%) scale(1);opacity:1;}}
#fact-pop.open{display:block;}
#fact-emoji{font-size:36px;display:block;margin-bottom:6px;}
#fact-title{font-family:'Bubblegum Sans',cursive;font-size:14px;color:var(--gold);margin-bottom:4px;}
#fact-text{font-size:16px;color:#fff;line-height:1.4;}

/* LEVEL UP */
#levelup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:900;text-align:center;pointer-events:none;
  display:none;
}
#levelup.open{display:block;animation:lvlPop .6s cubic-bezier(.175,.885,.32,1.275);}
@keyframes lvlPop{from{transform:translate(-50%,-50%) scale(0);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}
#lvl-text{font-family:'Bubblegum Sans',cursive;font-size:52px;color:var(--gold);text-shadow:0 0 30px var(--gold);}
#lvl-sub{font-size:22px;color:#fff;margin-top:4px;}

/* SPARKLES */
.sp{position:fixed;pointer-events:none;z-index:1000;font-size:22px;animation:spAnim .8s ease-out forwards;}
@keyframes spAnim{0%{transform:scale(0) rotate(0);opacity:1;}100%{transform:scale(1.4) rotate(200deg) translateY(-40px);opacity:0;}}

/* POWER INDICATOR */
#power-bar{
  position:fixed;bottom:16px;left:16px;z-index:700;
  display:flex;gap:8px;align-items:center;
}
.power-pip{
  width:38px;height:38px;border-radius:12px;
  background:rgba(255,255,255,0.07);
  border:2px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;position:relative;
}
.power-pip.active{border-color:var(--gold);background:rgba(255,215,0,0.15);box-shadow:0 0 12px rgba(255,215,0,0.4);}
.power-pip .pip-key{
  position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  font-size:9px;color:rgba(255,255,255,0.35);white-space:nowrap;
}

/* ── TOUCH CONTROLS ── */
#touch-controls{
  position:fixed;inset:0;pointer-events:none;z-index:650;
  display:none; /* shown only on touch devices */
}
/* Joystick */
#joystick-zone{
  position:absolute;
  bottom:calc(16px + env(safe-area-inset-bottom, 0px));
  left:24px;
  width:148px;height:148px;
  pointer-events:all;
}
#joystick-base{
  position:absolute;inset:0;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:3px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(4px);
}
#joystick-knob{
  position:absolute;
  width:56px;height:56px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(126,232,255,0.9),rgba(35,166,213,0.7));
  border:3px solid rgba(255,255,255,0.5);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  transition:none;
}
/* Right-side touch buttons — left of minimap (minimap is 142px wide + 12px margin) */
#touch-right{
  position:absolute;
  bottom:calc(12px + env(safe-area-inset-bottom, 0px));
  right:162px;
  display:flex;flex-direction:column;gap:10px;align-items:center;
  pointer-events:all;
}
.touch-btn{
  width:72px;height:72px;border-radius:50%;
  background:rgba(2,18,44,0.82);
  border:3px solid rgba(35,166,213,0.55);
  color:#fff;font-size:30px;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
  box-shadow:0 4px 18px rgba(0,0,0,0.35);
  user-select:none;-webkit-user-select:none;
  transition:transform .1s,background .1s;
  cursor:pointer;
}
.touch-btn:active,.touch-btn.pressed{
  transform:scale(0.88);
  background:rgba(35,166,213,0.4);
  border-color:var(--soft);
}
#touch-interact{border-color:rgba(255,215,0,0.7);}
/* Touch power buttons — above the action buttons */
#touch-powers{
  position:absolute;
  bottom:calc(170px + env(safe-area-inset-bottom, 0px));
  right:162px;
  display:flex;flex-direction:column;gap:8px;
  pointer-events:all;
}
.touch-power-btn{
  width:54px;height:54px;border-radius:14px;
  background:rgba(2,18,44,0.8);
  border:2px solid rgba(255,255,255,0.2);
  color:#fff;font-size:24px;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
  box-shadow:0 3px 12px rgba(0,0,0,0.3);
  cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:all .1s;
}
.touch-power-btn.active{border-color:var(--gold);background:rgba(255,215,0,0.2);box-shadow:0 0 14px rgba(255,215,0,0.5);}
.touch-power-btn:active{transform:scale(0.88);}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     HOME / TITLE SCREEN
════════════════════════════════════════ -->
<div id="home-screen">
  <canvas class="home-bubbles" id="home-canvas"></canvas>
  <div class="home-title">🐋 Whale World!</div>
  <div class="home-sub">Your underwater adventure awaits!</div>
  <button class="big-btn" onclick="beginGame()">🌊 Play!</button>
</div>

<!-- ═══════════════════════════════════════
     GAME CANVAS
════════════════════════════════════════ -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud" style="display:none;">
  <div id="hud-name">🐋 Blue Whale</div>
  <div id="hud-stars">⭐ 0</div>
  <div id="hud-power"></div>
  <div id="hud-hint">Arrow keys to swim • Space = power!</div>
</div>

<!-- Quest HUD -->
<div id="quest-hud">
  <div id="qh-title">📜 Quest!</div>
  <div id="qh-text">...</div>
  <div id="qh-bar-wrap"><div id="qh-bar" style="width:0%"></div></div>
  <div id="qh-count"></div>
</div>

<!-- Power bar -->
<div id="power-bar"></div>

<!-- TOUCH CONTROLS -->
<div id="touch-controls">
  <div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>
  <div id="touch-right">
    <button class="touch-btn" id="touch-interact" onclick="tryInteract()">💬</button>
    <button class="touch-btn" id="touch-cave" onclick="touchCaveBtn()">🏠</button>
  </div>
  <div id="touch-powers"></div>
</div>

<!-- ═══════════════════════════════════════
     DIALOGUE BOX
════════════════════════════════════════ -->
<div class="panel" id="dialogue">
  <div id="dlg-avatar">🐢</div>
  <div id="dlg-body">
    <div id="dlg-name">Terry the Turtle</div>
    <div id="dlg-text">Hello there!</div>
    <div id="dlg-sub"></div>
    <div id="dlg-fact" style="display:none;margin-top:10px;padding:10px 12px;
      background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.35);
      border-radius:12px;">
      <div id="dlg-fact-title" style="font-family:'Bubblegum Sans',cursive;font-size:12px;color:var(--gold);margin-bottom:3px;">🐋 Did You Know?</div>
      <div id="dlg-fact-text" style="font-size:15px;color:#fff;line-height:1.45;"></div>
    </div>
    <button class="dlg-btn" id="dlg-ok" onclick="closeDlg()">OK!</button>
    <button class="dlg-btn" id="dlg-accept" onclick="acceptQuest()" style="display:none;">Accept Quest!</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     FACT POPUP
════════════════════════════════════════ -->
<div id="fact-pop">
  <span id="fact-emoji">🐋</span>
  <div id="fact-title">Did You Know?</div>
  <div id="fact-text"></div>
</div>

<!-- ═══════════════════════════════════════
     LEVEL UP
════════════════════════════════════════ -->
<div id="levelup">
  <div id="lvl-text">⭐ LEVEL UP! ⭐</div>
  <div id="lvl-sub"></div>
</div>

<!-- ═══════════════════════════════════════
     CAVE / SHOP SCREEN
════════════════════════════════════════ -->
<div id="cave-screen" style="display:none;">
  <div class="cave-title">🏠 Your Whale Cave!</div>
  <div class="cave-gold" id="cave-gold-display">⭐ 0 Stars</div>
  <div class="cave-tabs">
    <button class="cave-tab active" onclick="showTab('colors')">🎨 Colors</button>
    <button class="cave-tab" onclick="showTab('accessories')">✨ Dress Up</button>
    <button class="cave-tab" onclick="showTab('powers')">⚡ Powers</button>
  </div>
  <div class="shop-grid" id="shop-grid"></div>
  <button class="leave-cave-btn" onclick="leaveCave()">🌊 Go Explore!</button>
</div>

<script>
// ════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════
const WHALE_FACTS=[
  {e:'🐋',t:'Blue whales are the BIGGEST animals that have EVER lived on Earth! Even bigger than dinosaurs!'},
  {e:'🎵',t:'Humpback whales sing beautiful songs that can last for HOURS! No two songs are the same!'},
  {e:'🦷',t:'Blue whales have no teeth! They use giant bristles called baleen to catch tiny shrimp called krill.'},
  {e:'💨',t:'Whales breathe AIR, just like you! They hold their breath and come up to breathe through their blowholes.'},
  {e:'🧠',t:'Orcas (killer whales) are super smart! They live in families and even have their own language!'},
  {e:'🦄',t:'Narwhals have a long spiral tusk! It\'s actually a giant tooth that grows through their lip. Magical!'},
  {e:'⚪',t:'Beluga whales are called the "canaries of the sea" because they make SO many funny sounds!'},
  {e:'🍤',t:'A blue whale eats up to 40 million tiny krill every single day! That\'s like eating 4 million sandwiches!'},
  {e:'💤',t:'Whales sleep by floating near the surface. Only half their brain sleeps at a time so they can keep breathing!'},
  {e:'👶',t:'Baby blue whales drink 50 bathtubs of milk every day and grow super fast!'},
  {e:'📏',t:'Blue whales can grow to 100 feet long. That\'s as long as 3 school buses lined up!'},
  {e:'❤️',t:'A blue whale\'s heart is as big as a small car and beats only about 8 times per minute!'},
  {e:'🐋',t:'Sperm whales can dive 2 miles underwater and hold their breath for 90 minutes!'},
  {e:'🌍',t:'Whales help the whole ocean! Their poop (yes, poop!) feeds tiny plants that make oxygen for us to breathe.'},
  {e:'🏋️',t:'A whale\'s tongue can weigh as much as an elephant! Blue whales have the biggest tongues ever!'},
];

const NPC_DEFS=[
  {id:'terry',  name:'Terry the Turtle',  emoji:'🐢', color:'#2ecc71',
   lines:['Hello little whale! The ocean is full of wonders today!','I have been swimming these seas for 100 years! There is so much to discover!','Come back anytime for a new adventure, friend!'],
   questLines:['Oh! Could you help me? I lost my favorite shells!','You are SO helpful! Here is your reward!']},
  {id:'crabby', name:'Crabby the Crab',   emoji:'🦀', color:'#e74c3c',
   lines:['SNAP SNAP! Oh! You scared me! I was just... being crabby hehe!','I found a treasure chest once but a fish ate my map. Very rude!','SNAP SNAP! That means hello in crab language!'],
   questLines:['Ohhhh could you find some sparkly diamonds? I love shiny things! SNAP!','OHHH you are the best whale friend EVER! SNAP SNAP SNAP!']},
  {id:'jellie', name:'Jelly the Jellyfish',emoji:'🪼', color:'#9b59b6',
   lines:['I glow in the dark! Pretty cool right? I taught myself!','The deep ocean is FULL of magic. I have seen it!','Sometimes I forget where I am going because I have no brain. But I am still VERY wise!'],
   questLines:['Oh wise one! Collect the magical glowing orbs for my spell! Pretty please?','WONDERFUL! The magic of the sea rewards you! ✨']},
  {id:'dolly',  name:'Dolly the Dolphin',  emoji:'🐬', color:'#23a6d5',
   lines:['Eeee eeee! That means YAY in dolphin!','Race you to the coral reef! Just kidding... unless?','Did you know dolphins and whales are cousins? We are FAMILY!'],
   questLines:['Hey hey hey! I am throwing a party but I need FISH friends to come! Can you find some?','EEE EEE EEE! Party time! Thank you thank you thank you!']},
];

const COLLECTIBLES=[
  {id:'star',   emoji:'⭐', points:1,  label:'Star',    size:28, glow:'rgba(255,215,0,0.6)'},
  {id:'diamond',emoji:'💎', points:3,  label:'Diamond', size:26, glow:'rgba(100,200,255,0.6)'},
  {id:'shell',  emoji:'🐚', points:2,  label:'Shell',   size:28, glow:'rgba(255,180,120,0.5)'},
  {id:'coral',  emoji:'🪸', points:2,  label:'Coral',   size:30, glow:'rgba(255,100,100,0.4)'},
  {id:'fish',   emoji:'🐠', points:5,  label:'Fish',    size:32, glow:'rgba(255,150,50,0.5)'},
  {id:'orb',    emoji:'🔮', points:6,  label:'Magic Orb',size:26,glow:'rgba(180,100,255,0.7)'},
  {id:'jellyfish',emoji:'🪼',points:3, label:'Jellyfish',size:30,glow:'rgba(200,150,255,0.5)'},
  {id:'squid',  emoji:'🦑', points:4,  label:'Squid',   size:28, glow:'rgba(150,100,180,0.5)'},
  {id:'pearl',  emoji:'🫧', points:2,  label:'Pearl',   size:24, glow:'rgba(200,230,255,0.5)'},
  {id:'krill',  emoji:'🦐', points:1,  label:'Krill',   size:22, glow:'rgba(255,200,150,0.4)'},
];

const QUEST_TEMPLATES=[
  {giver:'terry',  target:'shell',     count:4, reward:12, text:'Collect {n} shells for Terry!'},
  {giver:'crabby', target:'diamond',   count:3, reward:15, text:'Find {n} sparkling diamonds for Crabby!'},
  {giver:'jellie', target:'orb',       count:3, reward:18, text:'Collect {n} magic orbs for Jelly\'s spell!'},

function initWorld(){

    G.items.push({...c,iid:i,

let activeTab='colors';
function showCave(){
  document.getElementById('cave-screen').style.display='flex';
  document.getElementById('cave-gold-display').textContent='⭐ '+G.stars+' Stars';
  renderShop();
}
function leaveCave(){
  document.getElementById('cave-screen').style.display='none';
}
function showTab(tab){
  activeTab=tab;
  document.querySelectorAll('.cave-tab').forEach((t,i)=>{
    t.classList.toggle('active',['colors','accessories','powers'][i]===tab);
  });
  renderShop();
}
function renderShop(){
  const grid=document.getElementById('shop-grid');
  grid.innerHTML='';
  const items=SHOP_ITEMS[activeTab==='powers'?'powers':activeTab==='accessories'?'accessories':'colors'];
  items.forEach(item=>{
    const owned=G.ownedItems.has(item.id);
    const equipped=G.equippedColor===item.id||G.equippedAccs.has(item.id)||G.ownedPowers[item.id];
    const div=document.createElement('div');
    div.className='shop-item'+(equipped?' equipped':owned?' owned':'');
    div.innerHTML=`<span class="shop-emoji">${item.emoji}</span>
      <div class="shop-name">${item.name}</div>
      <div class="shop-cost">${owned?'✅ Owned':'⭐ '+item.cost}</div>
      ${item.desc?`<div class="shop-desc">${item.desc}</div>`:''}
      ${item.key?`<div class="shop-desc">Press [${item.key}] to use!</div>`:''}`;
    div.onclick=()=>buyOrEquip(item);
    grid.appendChild(div);
  });
  document.getElementById('cave-gold-display').textContent='⭐ '+G.stars+' Stars';
}
function buyOrEquip(item){
  if(!G.ownedItems.has(item.id)){
    if(G.stars<item.cost){showFact({e:'😅',t:'You need more stars! Go explore and collect treasures!',title:'Not enough stars!'});return;}
    G.stars-=item.cost;
    G.ownedItems.add(item.id);
    spawnSparkles(window.innerWidth/2,window.innerHeight/2,8);
    showFact({e:item.emoji,t:'You got: '+item.name+'! Awesome!',title:'New item!'});
  }
  // equip
  if(item.type==='color'){
    G.equippedColor=item.id;
    G.bodyColor=item.bodyColor; G.bellyColor=item.bellyColor;
    G.specialColor=item.special||null;
    G.colorRainbowT=0;
  }else if(item.type==='acc'){
    const key=item.id;
    if(G.equippedAccs.has(key)) G.equippedAccs.delete(key);
    else G.equippedAccs.add(key);
  }else if(item.type==='power'){
    G.ownedPowers[item.id]=true;
  }
  updateHUD();
  renderShop();
  updatePowerBar();
}

let pendingQuestNPC=null;
function openDlg(npc,text,sub,showAccept,fact){
  document.getElementById('dlg-avatar').textContent=npc.emoji;
  document.getElementById('dlg-name').textContent=npc.name;
  document.getElementById('dlg-text').textContent=text;
  document.getElementById('dlg-sub').textContent=sub||'';
  document.getElementById('dlg-accept').style.display=showAccept?'inline-block':'none';
  // Embed whale fact directly in dialogue if provided
  const factEl=document.getElementById('dlg-fact');
  if(fact){
    document.getElementById('dlg-fact-title').textContent=fact.e+' Did You Know?';
    document.getElementById('dlg-fact-text').textContent=fact.t;
    factEl.style.display='block';
  } else {
    factEl.style.display='none';
  }
  document.getElementById('dialogue').classList.add('open');
  G.dlgOpen=true;
}
function closeDlg(){
  document.getElementById('dialogue').classList.remove('open');
  G.dlgOpen=false;
  pendingQuestNPC=null;
}
function acceptQuest(){
  closeDlg();
  if(pendingQuestNPC) giveQuest(pendingQuestNPC);
}
function talkToNPC(npc){
  if(G.dlgOpen)return;
  // Pick an unseen whale fact to show inside this dialogue
  const notSeen=[...Array(WHALE_FACTS.length).keys()].filter(i=>!G.factsShown.has(i));
  const fi=notSeen.length>0?notSeen[Math.floor(Math.random()*notSeen.length)]:Math.floor(Math.random()*WHALE_FACTS.length);
  G.factsShown.add(fi);
  const fact=WHALE_FACTS[fi];

  // Quest complete?
  if(G.quest && G.questProgress>=G.quest.qt.count && G.quest.npc.id===npc.id){
    G.stars+=G.quest.qt.reward;
    spawnSparkles(npc.x-(G.x-canvas.width/2),npc.y-(G.y-canvas.height/2),12);
    showLevelCheck();
    npc.questGiven=false;
    openDlg(npc,npc.questLines[1],'⭐ +'+G.quest.qt.reward+' Stars earned!',false,fact);
    G.quest=null; G.questProgress=0;
    updateQuestHUD(); updateHUD();
    return;
  }
  // Give new quest?
  if(!G.quest && !npc.questGiven){
    const qtemplate=QUEST_TEMPLATES.filter(q=>q.giver===npc.id);
    if(qtemplate.length>0){
      const qt=qtemplate[Math.floor(Math.random()*qtemplate.length)];
      pendingQuestNPC={npc,qt};
      openDlg(npc,npc.questLines[0],
        '📜 Quest: '+qt.text.replace('{n}',qt.count)+' (Reward: ⭐'+qt.reward+')',true,fact);
      return;
    }
  }
  // Just chatting
  const line=npc.lines[Math.floor(Math.random()*npc.lines.length)];
  openDlg(npc,line,'',false,fact);
}
function giveQuest(data){
  G.quest={npc:data.npc, qt:data.qt};
  G.questProgress=0;
  data.npc.questGiven=true;
  updateQuestHUD();
}
function updateQuestHUD(){
  const el=document.getElementById('quest-hud');
  if(!G.quest){el.classList.remove('open');return;}
  el.classList.add('open');
  const txt=G.quest.qt.text.replace('{n}',G.quest.qt.count);
  document.getElementById('qh-text').textContent=txt;
  document.getElementById('qh-title').textContent='📜 Quest from '+G.quest.npc.name+'!';
  const pct=Math.min(100,G.questProgress/G.quest.qt.count*100);
  document.getElementById('qh-bar').style.width=pct+'%';
  document.getElementById('qh-count').textContent=G.questProgress+' / '+G.quest.qt.count;
}

//  UPDATE
// ════════════════════════════════════════════════════
const SPEED=3.8, FRICTION=0.87, MAX_V=7;
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

function update(){
  const g=G; g.tick++;
  if(g.dlgOpen)return; // pause movement during dialogue

  // Power effects
  if(g.powerTimer>0)g.powerTimer--;
  const spd_mult=g.activePower==='p_speed'&&g.powerTimer>0?2.2:1;

  const up=KEYS['ArrowUp']||KEYS['w']||KEYS['W'];
  const down=KEYS['ArrowDown']||KEYS['s']||KEYS['S'];
  const left=KEYS['ArrowLeft']||KEYS['a']||KEYS['A'];
  const right=KEYS['ArrowRight']||KEYS['d']||KEYS['D'];

  if(up)   g.vy-=SPEED*spd_mult;
  if(down) g.vy+=SPEED*spd_mult;
  if(left) g.vx-=SPEED*spd_mult;
  if(right)g.vx+=SPEED*spd_mult;

  // Touch joystick input
  applyTouchInput();

  g.vx*=FRICTION; g.vy*=FRICTION;
  const sp=Math.sqrt(g.vx*g.vx+g.vy*g.vy);
  if(sp>MAX_V*spd_mult){g.vx=g.vx/sp*MAX_V*spd_mult;g.vy=g.vy/sp*MAX_V*spd_mult;}
  if(sp>0.4)g.angle=Math.atan2(g.vy,g.vx);

  g.x=Math.max(80,Math.min(WORLD-80,g.x+g.vx));
  g.y=Math.max(80,Math.min(WORLD-80,g.y+g.vy));

  // Magnet power
  if(g.activePower==='p_magnet'&&g.powerTimer>0){
    g.items.forEach(it=>{
      if(it.collected)return;
      const dx=it.x-g.x,dy=it.y-g.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<280){it.x-=dx/d*4;it.y-=dy/d*4;}
    });
  }

  // Wobble collectibles
  g.items.forEach(it=>{it.wobble+=it.ws;});
  g.npcs.forEach(npc=>{npc.wobble+=0.02;});
  if(g.specialColor==='rainbow')g.colorRainbowT+=0.02;

  // Collect items
  const collectR=g.activePower==='p_magnet'&&g.powerTimer>0?70:42;
  let questCollected=false;
  g.items.forEach(it=>{
    if(it.collected)return;
    const dx=it.x-g.x,dy=it.y-g.y;
    if(dx*dx+dy*dy<collectR*collectR){
      it.collected=true;
      G.stars+=it.points;
      gainXP(it.points);
      updateHUD();
      showCollectPop(it.emoji+' +'+it.points);
      spawnWorldParticles(it.x,it.y,it.emoji);
      spawnBubbles(g.x,g.y,3);
      if(g.quest&&it.id===g.quest.qt.target&&!questCollected){
        g.questProgress=Math.min(g.questProgress+1,g.quest.qt.count);
        questCollected=true;
        updateQuestHUD();
        if(g.questProgress>=g.quest.qt.count){
          setTimeout(()=>showFact({e:'🎉',t:'Quest done! Go back to '+g.quest.npc.name+' to get your reward!',title:'Quest Complete!'}),400);
        }
      }
    }
  });

  // NPC proximity
  g.nearNPC=null;
  g.npcs.forEach(npc=>{
    const dx=npc.x-g.x,dy=npc.y-g.y;
    if(dx*dx+dy*dy<80*80)g.nearNPC=npc;
  });

  // Home proximity
  const hdx=g.homeX-g.x,hdy=g.homeY-g.y;
  g.nearHome=hdx*hdx+hdy*hdy<90*90;

  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  const hint=document.getElementById('hud-hint');
  if(g.nearNPC) hint.textContent=isTouch?'Tap 💬 to talk to '+g.nearNPC.name+'!':'Space or E to talk to '+g.nearNPC.name+'!';
  else if(g.nearHome) hint.textContent=isTouch?'Tap 🏠 to enter your cave!':'Space or E to enter your cave!';
  else if(!isTouch) hint.textContent='Arrow keys to swim • Space = interact';

  // Passive bubbles
  if(sp>1&&g.tick%14===0)spawnBubbles(g.x,g.y,1);
  if(g.activePower==='p_shield'&&g.powerTimer>0&&g.tick%6===0)spawnBubbles(g.x,g.y,2);
  if(g.activePower==='p_glow'&&g.powerTimer>0&&g.tick%8===0)spawnBubbles(g.x,g.y,1);

  // Update bubbles
  g.bubbles=g.bubbles.filter(b=>{
    b.y-=b.speed;b.x+=Math.sin(b.t*0.09)*0.7;b.t++;b.life--;return b.life>0;
  });
  g.particles=g.particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life--;p.alpha=p.life/p.maxLife;return p.life>0;
  });

  if(g.powerTimer===0&&g.activePower){g.activePower=null;updatePowerBar();}
  updatePowerBar();
}

function spawnBubbles(wx,wy,n){
  for(let i=0;i<n;i++) G.bubbles.push({
    x:wx+(Math.random()-.5)*30,y:wy+(Math.random()-.5)*20,
    r:3+Math.random()*9,speed:0.7+Math.random()*0.9,life:80+Math.random()*60,t:0});
}
function spawnWorldParticles(wx,wy,emoji){
  for(let i=0;i<7;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    G.particles.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,
      emoji,life:40,maxLife:40,alpha:1});
  }
}

let popTO2=null;
function showCollectPop(txt){
  const el=document.getElementById('fact-pop');
  // use a small inline toast instead
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;top:${80+Math.random()*40}px;left:${40+Math.random()*200}px;
    font-family:'Bubblegum Sans',cursive;font-size:22px;color:#ffd700;
    text-shadow:0 0 10px #ffd700;pointer-events:none;z-index:800;
    animation:spAnim .8s ease-out forwards;`;
  toast.textContent=txt;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),900);
}

// ════════════════════════════════════════════════════
//  BACKGROUND WORLD TEXTURE (pre-render)
// ════════════════════════════════════════════════════
const bgCanvas=document.createElement('canvas');
bgCanvas.width=WORLD;bgCanvas.height=WORLD;
let bgReady=false;
function buildBg(){
  const bc=bgCanvas.getContext('2d');
  const grad=bc.createLinearGradient(0,0,0,WORLD);
  grad.addColorStop(0,'#1a7aad');
  grad.addColorStop(0.25,'#0a4a7c');
  grad.addColorStop(0.6,'#03224c');
  grad.addColorStop(1,'#010e20');
  bc.fillStyle=grad;bc.fillRect(0,0,WORLD,WORLD);
  // Subtle grid variation
  for(let tx=0;tx<WORLD/80;tx++){
    for(let ty=0;ty<WORLD/80;ty++){
      if(Math.random()>.96){
        bc.fillStyle='rgba(255,255,255,0.025)';
        bc.fillRect(tx*80,ty*80,80,80);
      }
    }
  }
  // Light rays
  for(let i=0;i<24;i++){
    const rx=Math.random()*WORLD;
    const lg=bc.createLinearGradient(rx,0,rx+100,WORLD*.5);
    lg.addColorStop(0,'rgba(255,255,255,0.055)');
    lg.addColorStop(1,'transparent');
    bc.save();bc.translate(rx,0);bc.rotate((Math.random()-.5)*.22);
    bc.fillStyle=lg;bc.fillRect(-20,0,60,WORLD*.6);bc.restore();
  }
  // Zone indicators (darker deep zones)
  bc.fillStyle='rgba(0,0,0,0.12)';
  bc.fillRect(0,WORLD*.6,WORLD,WORLD*.4);
  bgReady=true;
}
setTimeout(buildBg,100);

// ════════════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════════════
function draw(){
  const W=canvas.width,H=canvas.height;
  const camX=G.x-W/2,camY=G.y-H/2;
  ctx.clearRect(0,0,W,H);

  // BG
  if(bgReady){
    const sx=Math.max(0,camX),sy=Math.max(0,camY);
    const sw=Math.min(WORLD-sx,W),sh=Math.min(WORLD-sy,H);
    ctx.drawImage(bgCanvas,sx,sy,sw,sh,sx-camX,sy-camY,sw,sh);
  }else{
    ctx.fillStyle='#03224c';ctx.fillRect(0,0,W,H);
  }

  // World border glow
  ctx.save();ctx.strokeStyle='rgba(35,166,213,0.2)';ctx.lineWidth=50;
  ctx.strokeRect(-camX,-camY,WORLD,WORLD);ctx.restore();

  // Decor
  G.decorPts.forEach(d=>{
    const sx=d.x-camX,sy=d.y-camY;
    if(sx<-60||sx>W+60||sy<-60||sy>H+60)return;
    ctx.globalAlpha=.55;ctx.font=d.size+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.emoji,sx,sy);ctx.globalAlpha=1;
  });

  // Home cave
  drawHome(G.homeX-camX,G.homeY-camY);

  // NPCs
  G.npcs.forEach(npc=>drawNPC(npc,camX,camY));

  // Collectibles
  G.items.forEach(it=>{
    if(it.collected)return;
    const sx=it.x-camX,sy=it.y-camY;
    if(sx<-60||sx>W+60||sy<-60||sy>H+60)return;
    const bob=Math.sin(it.wobble)*5;
    ctx.save();
    ctx.shadowColor=it.glow;ctx.shadowBlur=16;
    ctx.font=it.size+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(it.emoji,sx,sy+bob);
    ctx.restore();
  });

  // Particles
  G.particles.forEach(p=>{
    const sx=p.x-camX,sy=p.y-camY;
    ctx.save();ctx.globalAlpha=p.alpha;
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.emoji,sx,sy);ctx.restore();
  });

  // Bubbles
  G.bubbles.forEach(b=>{
    const sx=b.x-camX,sy=b.y-camY;
    ctx.save();ctx.globalAlpha=Math.min(.55,b.life/60*.55);
    ctx.beginPath();ctx.arc(sx,sy,b.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  });

  // Shield effect
  if(G.activePower==='p_shield'&&G.powerTimer>0){
    ctx.save();
    ctx.globalAlpha=.3+Math.sin(G.tick*.15)*.1;
    ctx.strokeStyle='#7ee8ff';ctx.lineWidth=4;
    ctx.shadowColor='#23a6d5';ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(W/2,H/2,70,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // Glow effect
  if(G.activePower==='p_glow'&&G.powerTimer>0){
    ctx.save();
    const alpha=0.18+Math.sin(G.tick*.2)*.06;
    ctx.globalAlpha=alpha;
    const rad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,120);
    rad.addColorStop(0,'#ffd700');rad.addColorStop(1,'transparent');
    ctx.fillStyle=rad;ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // WHALE
  drawWhale(W/2,H/2);

  // Minimap
  drawMinimap(camX,camY,W,H);

  // NPC interact hint
  if(G.nearNPC||G.nearHome){
    ctx.save();
    const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
    ctx.font='16px Bubblegum Sans,cursive';
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=G.nearHome?'#ffd700':'#23a6d5';ctx.shadowBlur=12;
    const label=G.nearHome
      ?(isTouch?'🏠 Tap 🏠 button!':'🏠 [SPACE] Enter Cave')
      :(isTouch?'💬 Tap 💬 button!':'💬 [SPACE] Talk to '+G.nearNPC.name);
    ctx.fillText(label,W/2,H/2-100);
    ctx.restore();
  }

  // Nearest arrow
  drawNearestArrow(camX,camY,W,H);
}

// ─── HOME CAVE ───
function drawHome(sx,sy){
  ctx.save();
  // cave glow
  const grd=ctx.createRadialGradient(sx,sy,0,sx,sy,90);
  grd.addColorStop(0,'rgba(255,215,0,0.18)');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(sx-90,sy-90,180,180);
  // cave emoji
  ctx.font='60px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,215,0,0.6)';ctx.shadowBlur=20;
  const bob=Math.sin(G.tick*.04)*3;
  ctx.fillText('🏠',sx,sy+bob);
  // label
  ctx.font='13px Bubblegum Sans,cursive';
  ctx.fillStyle='#ffd700';ctx.shadowBlur=8;
  ctx.fillText('Your Cave!',sx,sy+40);
  ctx.restore();
}

// ─── NPC ───
function drawNPC(npc,camX,camY){
  const sx=npc.x-camX,sy=npc.y-camY;
  const W=canvas.width,H=canvas.height;
  if(sx<-80||sx>W+80||sy<-80||sy>H+80)return;
  ctx.save();
  // glow ring
  ctx.beginPath();ctx.arc(sx,sy,38,0,Math.PI*2);
  ctx.fillStyle='rgba(35,166,213,0.12)';ctx.fill();
  ctx.strokeStyle=npc.color+'88';ctx.lineWidth=2;ctx.stroke();
  // quest indicator
  if(G.quest&&G.questProgress>=G.quest.qt.count&&G.quest.npc.id===npc.id){
    ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('❗',sx,sy-48+Math.sin(G.tick*.12)*4);
  } else if(!G.quest&&!npc.questGiven&&QUEST_TEMPLATES.some(q=>q.giver===npc.id)){
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#ffd700';ctx.fillText('💬',sx,sy-48+Math.sin(G.tick*.1)*4);
  }
  const bob=Math.sin(npc.wobble)*6;
  ctx.font='44px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=npc.color;ctx.shadowBlur=16;
  ctx.fillText(npc.emoji,sx,sy+bob);
  // name label
  ctx.font='12px Bubblegum Sans,cursive';
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.shadowBlur=8;
  ctx.fillText(npc.name,sx,sy+34);
  ctx.restore();
}

// ─── WHALE ───
function darken(hex){
  if(!hex||hex==='transparent')return '#333';
  try{let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return`rgb(${Math.floor(r*.6)},${Math.floor(g*.6)},${Math.floor(b*.6)})`;}catch{return'#333';}
}

function getRainbowColor(t){
  const r=Math.sin(t)*127+128,g=Math.sin(t+2.094)*127+128,b=Math.sin(t+4.189)*127+128;
  return`rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
}

function drawWhale(cx,cy){
  const sp=Math.sqrt(G.vx*G.vx+G.vy*G.vy);
  const wag=Math.sin(G.tick*.18)*.2*(sp>.4?1:0);
  let bc=G.bodyColor,be=G.bellyColor;
  if(G.specialColor==='rainbow'){bc=getRainbowColor(G.colorRainbowT);be=getRainbowColor(G.colorRainbowT+1.5);}
  if(G.specialColor==='galaxy'){bc=`hsl(${(G.tick*1.2)%360},70%,30%)`;be=`hsl(${(G.tick*1.2+60)%360},60%,60%)`;}
  const fin=darken(G.bodyColor);

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(G.angle);

  // Glow power aura
  if(G.activePower==='p_glow'&&G.powerTimer>0){
    ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=30+Math.sin(G.tick*.3)*10;
    ctx.globalAlpha=.4;ctx.beginPath();ctx.ellipse(18,0,90,48,0,0,Math.PI*2);
    ctx.fillStyle='#ffd700';ctx.fill();ctx.restore();
  }
  // Speed trail
  if(G.activePower==='p_speed'&&G.powerTimer>0&&sp>1){
    ctx.save();ctx.globalAlpha=.18;
    for(let i=1;i<=4;i++){
      ctx.beginPath();ctx.ellipse(18-i*14,0,90,46,0,0,Math.PI*2);
      ctx.fillStyle='#23a6d5';ctx.fill();
    }
    ctx.restore();
  }

  ctx.save();ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=18;ctx.shadowOffsetY=6;

  // Tail
  ctx.save();ctx.translate(-70,0);ctx.rotate(wag);
  ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(-32,-36,-16,-56);ctx.quadraticCurveTo(-5,-24,10,-4);
  ctx.closePath();ctx.fillStyle=bc;ctx.fill();
  ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(-32,36,-16,56);ctx.quadraticCurveTo(-5,24,10,4);
  ctx.closePath();ctx.fillStyle=bc;ctx.fill();
  ctx.restore();

  // Flipper
  ctx.beginPath();ctx.moveTo(0,18);ctx.quadraticCurveTo(-26,52,-4,53);ctx.quadraticCurveTo(12,40,13,18);
  ctx.closePath();ctx.fillStyle=fin;ctx.fill();

  // Body
  ctx.beginPath();ctx.ellipse(18,0,80,43,0,0,Math.PI*2);ctx.fillStyle=bc;ctx.fill();
  // Belly
  ctx.beginPath();ctx.ellipse(26,16,57,23,0,0,Math.PI*2);ctx.fillStyle=be;ctx.fill();

  // Spots
  const sc=G.bodyColor; // reuse darken for spots if spot color set via shop
  // (spots handled via equippedAccs below)

  // Dorsal fin
  ctx.beginPath();ctx.moveTo(18,-44);ctx.quadraticCurveTo(44,-12,56,-5);ctx.quadraticCurveTo(38,-8,15,-8);
  ctx.closePath();ctx.fillStyle=fin;ctx.fill();

  ctx.restore();// shadow off

  // Eye
  ctx.beginPath();ctx.arc(73,-9,9,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
  ctx.beginPath();ctx.arc(75,-9,5,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();
  ctx.beginPath();ctx.arc(77,-11,1.8,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
  // Smile
  ctx.beginPath();ctx.arc(67,4,11,.1,Math.PI*.85);ctx.strokeStyle='rgba(10,58,106,.6)';ctx.lineWidth=2.5;ctx.stroke();
  // Blowhole
  ctx.beginPath();ctx.ellipse(79,-33,6,3,0,0,Math.PI*2);ctx.fillStyle=fin;ctx.fill();

  // Narwhal horn
  if(WHALE_TYPES[G.whaleType].horn){
    ctx.beginPath();ctx.moveTo(83,-30);ctx.lineTo(122,10);
    ctx.strokeStyle='#d4af37';ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
  }

  // Accessories
  const accPos={
    a_crown:[68,-55],a_hat:[67,-56],a_bow:[68,-46],a_glasses:[58,-9],
    a_flower:[77,-46],a_star:[54,-44],a_rainbow:[40,-54],a_halo:[68,-60],
    a_party:[64,-54],a_magic:[40,-50],
  };
  ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  SHOP_ITEMS.accessories.forEach(a=>{
    if(!G.equippedAccs.has(a.id))return;
    const [ax,ay]=accPos[a.id]||[60,-46];
    ctx.fillText(a.emoji,ax,ay);
  });

  ctx.restore();
}

// ─── MINIMAP ───
function drawMinimap(camX,camY,W,H){
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  const mw=130,mh=130;
  const mx=W-mw-12;
  const my=isTouch ? H-mh-180 : H-mh-12; // shift up on touch so it clears the action buttons
  const scale=mw/WORLD;
  ctx.save();ctx.globalAlpha=.88;
  ctx.fillStyle='rgba(2,18,44,0.8)';
  ctx.strokeStyle='rgba(35,166,213,0.5)';ctx.lineWidth=2;
  roundRect(ctx,mx,my,mw,mh,10);ctx.fill();ctx.stroke();
  // items
  ctx.globalAlpha=.5;
  G.items.forEach(it=>{
    if(it.collected)return;
    ctx.fillStyle='#ffd700';ctx.beginPath();
    ctx.arc(mx+it.x*scale,my+it.y*scale,1.5,0,Math.PI*2);ctx.fill();
  });
  // NPCs
  ctx.globalAlpha=.8;
  G.npcs.forEach(npc=>{
    ctx.fillStyle=npc.color;ctx.beginPath();
    ctx.arc(mx+npc.x*scale,my+npc.y*scale,3,0,Math.PI*2);ctx.fill();
  });
  // home
  ctx.fillStyle='#ffd700';ctx.font='10px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🏠',mx+G.homeX*scale,my+G.homeY*scale);
  // whale
  ctx.globalAlpha=1;ctx.fillStyle='#7ee8ff';ctx.beginPath();
  ctx.arc(mx+G.x*scale,my+G.y*scale,5,0,Math.PI*2);ctx.fill();
  // viewport
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
  ctx.strokeRect(mx+camX*scale,my+camY*scale,W*scale,H*scale);
  ctx.restore();
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

// ─── NEAREST ARROW ───
function drawNearestArrow(camX,camY,W,H){
  let nearest=null,nd=Infinity;
  // Quest target first
  if(G.quest&&G.questProgress<G.quest.qt.count){
    G.items.forEach(it=>{
      if(it.collected||it.id!==G.quest.qt.target)return;
      const dx=it.x-G.x,dy=it.y-G.y,d=dx*dx+dy*dy;
      if(d<nd){nd=d;nearest=it;}
    });
  }
  if(!nearest){
    G.items.forEach(it=>{
      if(it.collected)return;
      const dx=it.x-G.x,dy=it.y-G.y,d=dx*dx+dy*dy;
      if(d<nd){nd=d;nearest=it;}
    });
  }
  if(!nearest||nd<200*200)return;
  const sx=nearest.x-camX,sy=nearest.y-camY;
  if(sx>0&&sx<W&&sy>0&&sy<H)return;
  const a=Math.atan2(nearest.y-G.y,nearest.x-G.x);
  const ex=W/2+Math.cos(a)*(W/2-34),ey=H/2+Math.sin(a)*(H/2-64);
  ctx.save();ctx.translate(ex,ey);ctx.rotate(a);
  ctx.fillStyle='rgba(255,215,0,.85)';
  ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-10,-8);ctx.lineTo(-10,8);ctx.closePath();ctx.fill();
  ctx.restore();
  ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(nearest.emoji,ex,ey);
}

//  TOUCH CONTROLS
// ════════════════════════════════════════════════════
const touch={active:false,id:null,startX:0,startY:0,dx:0,dy:0};
const JOYSTICK_R=56; // max knob travel radius

function initTouchControls(){
  // Show touch UI only on touch-capable devices
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(!isTouch)return;
  document.getElementById('touch-controls').style.display='block';
  // Hide keyboard hint on touch
  document.getElementById('hud-hint').style.display='none';
  // Move power-bar off screen (touch powers used instead)
  document.getElementById('power-bar').style.display='none';

  const zone=document.getElementById('joystick-zone');
  const knob=document.getElementById('joystick-knob');

  function getZoneCenter(){
    const r=zone.getBoundingClientRect();
    return{x:r.left+r.width/2, y:r.top+r.height/2};
  }

  zone.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    touch.active=true; touch.id=t.identifier;
    touch.startX=t.clientX; touch.startY=t.clientY;
    touch.dx=0; touch.dy=0;
  },{passive:false});

  zone.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier!==touch.id)continue;
      let dx=t.clientX-touch.startX;
      let dy=t.clientY-touch.startY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>JOYSTICK_R){dx=dx/dist*JOYSTICK_R;dy=dy/dist*JOYSTICK_R;}
      touch.dx=dx; touch.dy=dy;
      // move knob visually
      knob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }
  },{passive:false});

  function endTouch(e){
    for(const t of e.changedTouches){
      if(t.identifier===touch.id){
        touch.active=false; touch.dx=0; touch.dy=0;
        knob.style.transform='translate(-50%,-50%)';
      }
    }
  }
  zone.addEventListener('touchend',endTouch,{passive:false});
  zone.addEventListener('touchcancel',endTouch,{passive:false});

  // Tap anywhere on game canvas to interact (when near NPC/home)
  canvas.addEventListener('touchstart',e=>{
    // only if not on joystick zone
    const r=zone.getBoundingClientRect();
    const t=e.touches[0];
    if(t.clientX>r.right||t.clientY<r.top||t.clientY>r.bottom+20) return;
  },{passive:true});
}

// Inject touch joystick input into the KEYS-style system
// Called each frame in update()
function applyTouchInput(){
  if(!touch.active)return;
  const norm=JOYSTICK_R*0.3; // dead zone
  const mag=Math.sqrt(touch.dx*touch.dx+touch.dy*touch.dy);
  if(mag<norm)return;
  // Treat like key presses scaled by magnitude
  const scale=(mag-norm)/(JOYSTICK_R-norm);
  const nx=touch.dx/mag*scale;
  const ny=touch.dy/mag*scale;
  G.vx+=nx*SPEED*1.1;
  G.vy+=ny*SPEED*1.1;
}

function buildTouchPowers(){
  const container=document.getElementById('touch-powers');
  container.innerHTML='';
  const powers=SHOP_ITEMS.powers.filter(p=>G.ownedPowers[p.id]);
  powers.forEach(p=>{

    btn.textContent=p.emoji;
    btn.addEventListener('touchstart',(e)=>{e.preventDefault();usePower(p.key);},{passive:false});
    btn.onclick=()=>usePower(p.key);
    container.appendChild(btn);
  });
}

//  HOME SCREEN BUBBLES ANIMATION
// ════════════════════════════════════════════════════
const hc=document.getElementById('home-canvas');
const hctx=hc.getContext('2d');
const hBubbles=[];
function initHomeBubbles(){
  hc.width=window.innerWidth;hc.height=window.innerHeight;
  for(let i=0;i<30;i++) hBubbles.push({
    x:Math.random()*hc.width,y:Math.random()*hc.height,
    r:6+Math.random()*20,speed:.4+Math.random()*.8,t:Math.random()*100});
}
function animHomeBubbles(){
  if(!document.getElementById('home-screen').style.display||
    document.getElementById('home-screen').style.display!=='none'){
    hctx.clearRect(0,0,hc.width,hc.height);
    hBubbles.forEach(b=>{
      b.y-=b.speed;b.x+=Math.sin(b.t*.07)*.8;b.t++;
      if(b.y<-40){b.y=hc.height+20;b.x=Math.random()*hc.width;}
      hctx.save();hctx.globalAlpha=.25;
      hctx.beginPath();hctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      hctx.fillStyle='rgba(255,255,255,0.3)';hctx.fill();
      hctx.strokeStyle='rgba(255,255,255,0.5)';hctx.lineWidth=1;hctx.stroke();
      hctx.restore();
    });
    requestAnimationFrame(animHomeBubbles);
  }
}
initHomeBubbles();animHomeBubbles();

//  MAIN GAME LOOP
// ════════════════════════════════════════════════════
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
